name: 다가오는 일정 알림 발송 (매일 자동)

# 매일 한국시간 오전 7시 13분(=UTC 전날 22:13) 자동 실행 + 수동 실행도 가능
# 크롤링은 하지 않고, 이미 저장된 public/data/schedule.json 기준으로 D-day가 맞는 구독자에게만 발송
on:
  schedule:
    - cron: '13 22 * * *'
  workflow_dispatch: {}

permissions:
  contents: write   # push-log.json(중복 발송 방지 기록)을 저장소에 다시 커밋하기 위해 필요

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 패키지 설치
        run: npm ci

      - name: 다가오는 일정 푸시 알림 발송
        env:
          WORKER_BASE_URL: ${{ secrets.WORKER_BASE_URL }}
          NOTIFY_API_KEY: ${{ secrets.NOTIFY_API_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: node scripts/notify.js

      - name: 발송 기록을 저장소에 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/push-log.json
          if git diff --cached --quiet; then
            echo "변경된 발송 기록 없음 — 커밋 생략"
          else
            git commit -m "알림 발송 기록 갱신 ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi
