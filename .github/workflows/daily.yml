name: 입시일정 자동 갱신 + 알림 발송 (매일)

# 매일 한국시간 오전 7시 13분(=UTC 전날 22:13) 자동 실행 + 수동 실행도 가능
# 정각(:00)은 크론이 몰려 지연되기 쉬워 :13으로 살짝 비켜 설정
on:
  schedule:
    - cron: '13 22 * * *'
  workflow_dispatch: {}

permissions:
  contents: write   # 크롤링 결과(public/data)를 저장소에 다시 커밋하기 위해 필요

jobs:
  crawl-and-notify:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설치
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: 패키지 설치
        run: npm ci

      - name: 대학어디가 대입일정 크롤링
        run: node crawl.js

      - name: 다가오는 일정 푸시 알림 발송
        env:
          WORKER_BASE_URL: ${{ secrets.WORKER_BASE_URL }}
          NOTIFY_API_KEY: ${{ secrets.NOTIFY_API_KEY }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
        run: node scripts/notify.js

      - name: 결과를 저장소에 커밋
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data
          if git diff --cached --quiet; then
            echo "변경된 데이터 없음 — 커밋 생략"
          else
            git commit -m "일정/알림 데이터 자동 갱신 ($(date -u +%Y-%m-%dT%H:%MZ))"
            git push
          fi

      - name: Cloudflare Worker에 최신 데이터 재배포
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          command: deploy
