# Cloudflare 배포 설정 — Worker(worker.js)가 정적 자산(public/) 서빙 + 웹 푸시 구독 API 처리
name = "ipsi-calendar"
main = "worker.js"
compatibility_date = "2024-12-01"

[assets]
directory = "./public"
binding = "ASSETS"

# 1회성 설정: `npx wrangler kv namespace create SUBSCRIPTIONS` 실행 후 나오는 id를 아래에 채워넣으세요.
[[kv_namespaces]]
binding = "SUBSCRIPTIONS"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
